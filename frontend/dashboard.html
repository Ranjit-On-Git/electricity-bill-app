<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PowerCalc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4 text-primary fw-bold">⚡ PowerCalc</h4>
                <a href="#" class="active" id="nav-calc">Calculator</a>
                <a href="#" id="nav-history">History</a>
                <a href="#" class="text-danger mt-5" id="logoutBtn">Logout</a>
            </nav>

            <main class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Welcome, <span id="userNameDisplay" class="text-primary"></span></h2>
                </div>

                <div id="calculatorSection">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card shadow-sm mb-4">
                                <div class="card-header bg-white">
                                    <h5 class="mb-0">Calculate Bill</h5>
                                </div>
                                <div class="card-body">
                                    <form id="calcForm">
                                        <div class="mb-3">
                                            <label class="form-label">Units Consumed</label>
                                            <input type="number" class="form-control" id="units" required min="0">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Fixed Charges (₹)</label>
                                            <input type="number" class="form-control" id="fixedCharges" required min="0" value="50">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Tax Percentage (%)</label>
                                            <input type="number" class="form-control" id="tax" required min="0" value="5">
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100">
                                            <span class="spinner-border spinner-border-sm loader" id="calcLoader"></span> Calculate
                                        </button>
                                    </form>
                                    <div id="calcAlert" class="alert d-none mt-3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card shadow-sm d-none" id="resultCard">
                                <div class="card-header bg-primary text-white">
                                    <h5 class="mb-0">Bill Breakdown</h5>
                                </div>
                                <div class="card-body">
                                    <ul class="list-group list-group-flush mb-3">
                                        <li class="list-group-item d-flex justify-content-between">
                                            <span>Energy Charge:</span> <strong id="resEnergy">₹0.00</strong>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between">
                                            <span>Fixed Charges:</span> <strong id="resFixed">₹0.00</strong>
                                        </li>
                                        <li class="list-group-item d-flex justify-content-between">
                                            <span>Tax Amount:</span> <strong id="resTax">₹0.00</strong>
                                        </li>
                                    </ul>
                                    <div class="alert alert-success d-flex justify-content-between align-items-center">
                                        <span class="fs-5">Total Bill:</span> <strong class="fs-4" id="resTotal">₹0.00</strong>
                                    </div>
                                    <small class="text-muted d-block mt-2">Slab: 0-100(₹5), 101-200(₹7), >200(₹10)</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="historySection" class="d-none">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Calculation History</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Date</th>
                                            <th>Units</th>
                                            <th>Energy Chg</th>
                                            <th>Fixed Chg</th>
                                            <th>Tax</th>
                                            <th>Total (₹)</th>
                                        </tr>
                                    </thead>
                                    <tbody id="historyTableBody">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="js/dashboard.js"></script>
</body>
</html>
